<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <rect width="600" height="420" fill="#ffffff" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="3" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>
  <rect width="600" height="420" fill="url(#dots)"/>
  <!-- Accent dots -->
  <circle cx="120" cy="100" r="3" fill="rgba(0,122,94,0.4)"/>
  <circle cx="200" cy="180" r="3" fill="rgba(0,122,94,0.4)"/>
  <circle cx="320" cy="80"  r="3" fill="rgba(61,48,196,0.3)"/>
  <circle cx="440" cy="220" r="3" fill="rgba(0,122,94,0.4)"/>
  <circle cx="500" cy="140" r="3" fill="rgba(61,48,196,0.3)"/>
  <!-- Accent box -->
  <rect x="460" y="344" width="140" height="76" fill="#2563eb"/>
  <text x="530" y="382" font-family="sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle">2017</text>
  <text x="530" y="402" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">FUNDACIÓN</text>
</svg>
